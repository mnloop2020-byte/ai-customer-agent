services:
  db:
    image: postgres:16-alpine
    container_name: ai-customer-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_customer_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_customer_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
